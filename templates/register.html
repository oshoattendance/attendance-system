<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Attendance System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;
             background:linear-gradient(135deg,#f093fb,#f5576c);
             min-height:100vh;display:flex;justify-content:center;
             align-items:center;padding:20px}
        .card{background:white;border-radius:20px;padding:35px;width:500px;
              box-shadow:0 20px 60px rgba(0,0,0,0.3)}
        .logo{text-align:center;margin-bottom:25px}
        .logo i{font-size:45px;color:#f5576c}
        .logo h1{font-size:22px;color:#333;margin:8px 0}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:15px}
        .form-group{margin-bottom:15px}
        .form-group label{display:block;margin-bottom:5px;font-weight:600;
                          color:#555;font-size:13px}
        .form-group input,.form-group select{width:100%;padding:11px 14px;
            border:2px solid #e0e0e0;border-radius:8px;font-size:14px;transition:.3s}
        .form-group input:focus,.form-group select:focus{border-color:#f5576c;outline:none}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#f093fb,#f5576c);
             color:white;border:none;border-radius:10px;font-size:16px;
             cursor:pointer;font-weight:600;margin-top:5px}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(245,87,108,.4)}
        .links{text-align:center;margin-top:15px}
        .links a{color:#f5576c;text-decoration:none;font-weight:600}
        .flash{padding:10px;border-radius:8px;margin-bottom:12px;font-size:13px}
        .success{background:#d4edda;color:#155724}
        .error{background:#f8d7da;color:#721c24}
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <i class="fas fa-user-plus"></i>
        <h1>Employee Registration</h1>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat,msg in messages %}
    <div class="flash {{cat}}">{{msg}}</div>
    {% endfor %}{% endif %}{% endwith %}
    <form method="POST">
        <div class="row">
            <div class="form-group">
                <label>Employee ID *</label>
                <input type="text" name="emp_id" placeholder="e.g. EMP001" required>
            </div>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" placeholder="email@company.com" required>
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" name="phone" placeholder="9876543210">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>Department *</label>
                <select name="department" required>
                    <option value="">Select</option>
                    <option value="IT">IT</option>
                    <option value="HR">HR</option>
                    <option value="Finance">Finance</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Operations">Operations</option>
                    <option value="Sales">Sales</option>
                    <option value="Management">Management</option>
                </select>
            </div>
            <div class="form-group">
                <label>Designation</label>
                <input type="text" name="designation" placeholder="e.g. Developer">
            </div>
        </div>
        <div class="form-group">
            <label>Password *</label>
            <input type="password" name="password" placeholder="Create password" required minlength="4">
        </div>
        <button type="submit" class="btn">
            <i class="fas fa-user-check"></i> Register
        </button>
    </form>
    <div class="links">
        <p>Already registered? <a href="/login">Login Here</a></p>
    </div>
</div>
</body>
</html>
